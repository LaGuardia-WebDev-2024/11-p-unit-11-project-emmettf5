<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>My Favorite Albums!</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>My Top 3 Albums <span>Of All Time 🎵</span></h1>
    
    <button id="mem1-button" class="memory-button">Click For Memory #1</button>
    <button id="mem2-button" class="memory-button">Click For Memory #2</button>
    <button id="mem3-button" class="memory-button">Click For Memory #3</button>

    <ol>
      <li class="album-card">
        <img id="album-img-1" src="https://upload.wikimedia.org/wikipedia/en/thumb/3/3b/Steviewonder_innervisions.jpg/250px-Steviewonder_innervisions.jpg" alt="Innervisions Album">
        <h3 id="mem1">Innervisions</h3>
        <p id="desc1">MUST LISTEN.</p>
        <div id="memory1" class="memory-box"></div>
      </li>

      <li class="album-card">
        <img id="album-img-2" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ9y_46o_hL3AYvcX9mXI0VMUq4i_wuQWDQqw&s" alt="Tawk Tommohawk Album">
        <h3 id="mem2">Tawk Tommohawk</h3>
        <p id="desc2">Wonky but so cool.</p>
        <div id="memory2" class="memory-box"></div>
      </li>

      <li class="album-card">
        <img id="album-img-3" src="https://runforcoverrecords.com/cdn/shop/products/rfc014_2.jpg?v=1678901394" alt="The Last Thing You Forget Album">
        <h3 id="mem3">The Last Thing You Forget</h3>
        <p id="desc3">you can just tell they were hungry.</p>
        <div id="memory3" class="memory-box"></div>
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>

      
      // fortniet
      $("#mem1-button").click(function () {
        // colorhcange
        $("#mem1").css("color", "purple");
        
        // .text()
        $("#memory1").text("This Album changed my life");
        
        //.fadeIn()
      
        $("#memory1").fadeIn(1000);
      });

    
      $("#mem2-button").click(function () {
        //.css() 
        $("#mem2").css("color", "blue");
        
        //.html()
        $("#memory2").html("This album has some of the richest harmonies and melodies anyone will ever hear.");
        
      
        $("#memory2").fadeIn(1000);
      });

     
      $("#mem3-button").click(function () {
        
        $("#mem3").css("color", "green");
        
       
        $("#desc3").attr("data-memory", "This album is just absolutely electric");
        
      
        $("#memory3").html(" This album is just absolutely electric");
        
       
        $("#memory3").fadeIn(1000);
      });

      
      $(".memory-box").fadeIn(500);

    </script>
  </body>
</html>
